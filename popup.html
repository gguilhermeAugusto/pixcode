<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #fff;
    }

    h3 {
      font-size: 17px;
      color: #1a1a1a;
      margin-bottom: 6px;
      text-align: center;
    }

    p.sub {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      color: #333;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #32BCAD; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tipo-btn {
      padding: 9px 6px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      color: #333;
      transition: all 0.15s;
    }
    .tipo-btn:hover { border-color: #32BCAD; background: #f0fffd; }
    .tipo-btn.ultimo { grid-column: 1 / -1; }

    #erro {
      font-size: 12px;
      color: #e53935;
      text-align: center;
      margin-bottom: 8px;
      min-height: 16px;
    }

    /* Tela do QR */
    #tela-qr { display: none; }

    #tela-qr h3 { margin-bottom: 4px; }

    #tipo-label {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-bottom: 6px;
    }

    #chave-label {
      font-size: 12px;
      color: #333;
      background: #f4f4f4;
      padding: 6px 10px;
      border-radius: 6px;
      word-break: break-all;
      margin-bottom: 14px;
      text-align: center;
    }

    #qrContainer {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-row button {
      flex: 1;
      padding: 9px 6px;
      border: none;
      border-radius: 7px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }

    #btn-voltar  { background: #888; }
    #btn-copiar  { background: #32BCAD; }
  </style>
</head>
<body>

  <!-- Tela 1: input -->
  <div id="tela-input">
    <h3>💠 Gerador de Pix</h3>
    <p class="sub">Cole ou digite a chave Pix</p>
    <input type="text" id="chaveInput" placeholder="Celular, CPF, e-mail..." />
    <div id="erro"></div>
    <div class="grid">
      <button class="tipo-btn" data-tipo="telefone">📱 Celular</button>
      <button class="tipo-btn" data-tipo="cpf">🪪 CPF</button>
      <button class="tipo-btn" data-tipo="cnpj">🏢 CNPJ</button>
      <button class="tipo-btn" data-tipo="email">📧 E-mail</button>
      <button class="tipo-btn ultimo" data-tipo="uuid">🔑 Chave aleatória</button>
    </div>
  </div>

  <!-- Tela 2: QR Code -->
  <div id="tela-qr">
    <h3>🟢 QR Code Pix</h3>
    <div id="tipo-label"></div>
    <div id="chave-label"></div>
    <div id="qrContainer"></div>
    <div class="btn-row">
      <button id="btn-voltar">← Voltar</button>
      <button id="btn-copiar">Copiar código</button>
    </div>
  </div>

  <script src="qrcode_min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
